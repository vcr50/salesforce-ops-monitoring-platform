<template>
    <div class="login-wrapper">
        <div class="login-content">
            <!-- Left Side: Login Form -->
            <div class="login-box">
                <div class="logo-area">
                    <img src={logoUrl} alt="SentinelFlow Logo" class="brand-logo"/>
                    <h1 class="brand-name">SentinelFlow</h1>
                </div>
                <p class="login-sub">Sign in to your AI Operations Platform</p>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="you@company.com" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" />
                </div>
                
                <div class="form-options">
                    <label class="remember">
                        <input type="checkbox" /> Remember me
                    </label>
                    <a href="#" class="forgot">Forgot password?</a>
                </div>

                <button class="btn-primary" onclick={handleLogin}>Log In</button>
            </div>

            <!-- Right Side: Info Panel -->
            <div class="info-panel">
                <h2>The New Era of AI Operations</h2>
                <p>Welcome to SentinelFlow. The intelligent operations platform built natively on Salesforce.</p>
                
                <div class="feature-list">
                    <div class="feature-item">
                        <span class="icon">🤖</span>
                        <div>
                            <strong>Agentforce Copilot</strong>
                            <p>Self-healing automated runbooks.</p>
                        </div>
                    </div>
                    <div class="feature-item">
                        <span class="icon">📈</span>
                        <div>
                            <strong>Real-time Impact Analysis</strong>
                            <p>Instantly track revenue at risk.</p>
                        </div>
                    </div>
                    <div class="feature-item">
                        <span class="icon">⚡</span>
                        <div>
                            <strong>Unified Integrations</strong>
                            <p>Monitor your entire API ecosystem.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="login-footer">
            <p>&copy; 2026 TomCodeX Inc. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">Privacy Policy</a>
                <span class="divider">|</span>
                <a href="#">Terms &amp; Conditions</a>
            </div>
        </div>
    </div>
</template>
