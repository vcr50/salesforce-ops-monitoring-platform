<template>
    <section class={shellClass}>
        <div class="backdrop"></div>
        <div class="service-page">
            <header class="masthead">
                <div class="brand-lockup">
                    <span class="brand-mark"></span>
                    <span class="brand-name">{companyName}</span>
                </div>
                <div class="masthead-actions">
                    <span class="masthead-pill">Enterprise service engineering</span>
                    <button class="theme-button" onclick={toggleTheme} type="button">
                        {themeButtonLabel}
                    </button>
                </div>
            </header>

            <section class="hero-grid reveal" data-reveal>
                <article class="hero-stage">
                    <p class="eyebrow">Realtime service operations</p>
                    <h1 class="hero-title">A cinematic service experience for modern Salesforce operations.</h1>
                    <p class="hero-text">
                        {companyName} builds portals that feel closer to premium software product
                        launches than traditional admin tooling. The result is a cleaner, faster,
                        more credible digital surface for operations, support, and executive review.
                    </p>
                    <div class="hero-actions">
                        <a class="primary-action" href={primaryActionUrl}>Start a transformation brief</a>
                        <a class="secondary-action" href={secondaryActionUrl}>Review platform capabilities</a>
                    </div>
                    <div class="signal-row">
                        <span>Scroll-led storytelling</span>
                        <span>Realtime service telemetry</span>
                        <span>Dark and day modes</span>
                    </div>
                </article>

                <aside class="hero-visual">
                    <div class="hero-orbit orbit-one"></div>
                    <div class="hero-orbit orbit-two"></div>
                    <div class="product-canvas">
                        <div class="canvas-topbar">
                            <span class="canvas-pill">Tomcodex live fabric</span>
                            <span class="canvas-meta">Realtime view</span>
                        </div>
                        <div class="canvas-display">
                            <div class="display-main">
                                <span class="display-kicker">Operations command</span>
                                <span class="display-title">Unified portal layer</span>
                                <span class="display-copy">Incidents, integrations, releases, and executive signal in one branded surface.</span>
                            </div>
                            <div class="display-side">
                                <div class="side-card">
                                    <span class="side-label">Critical posture</span>
                                    <span class="side-value">2 active</span>
                                </div>
                                <div class="side-card">
                                    <span class="side-label">Release confidence</span>
                                    <span class="side-value">Stable</span>
                                </div>
                            </div>
                        </div>
                        <div class="canvas-feed">
                            <div class="feed-line">
                                <span class="feed-dot dot-green"></span>
                                <span>Portal components synchronized with live telemetry.</span>
                            </div>
                            <div class="feed-line">
                                <span class="feed-dot dot-blue"></span>
                                <span>Drill-down flows designed for operators and stakeholders.</span>
                            </div>
                            <div class="feed-line">
                                <span class="feed-dot dot-amber"></span>
                                <span>Experience architecture ready for premium client-facing rollout.</span>
                            </div>
                        </div>
                    </div>
                </aside>
            </section>

            <section class="capability-band reveal" data-reveal>
                <div class="band-label">Built for modern IT service teams</div>
                <div class="band-items">
                    <span>Operational Monitoring</span>
                    <span>Incident Automation</span>
                    <span>Integration Visibility</span>
                    <span>Experience Cloud UX</span>
                    <span>GitHub Delivery</span>
                    <span>Salesforce DX</span>
                </div>
            </section>

            <section class="story-panel reveal" data-reveal>
                <div class="story-copy-column">
                    <p class="section-eyebrow">Why it feels different</p>
                    <h2 class="section-title">The page moves like a product story, not a dashboard dump.</h2>
                    <p class="story-copy">
                        We use oversized hierarchy, calmer information density, and layered motion
                        so visitors understand the service model before they ever hit the operational
                        components below.
                    </p>
                </div>
                <div class="story-metrics">
                    <div class="story-metric">
                        <span class="story-metric-value">01</span>
                        <span class="story-metric-label">Premium first impression</span>
                    </div>
                    <div class="story-metric">
                        <span class="story-metric-value">02</span>
                        <span class="story-metric-label">Sticky narrative sections</span>
                    </div>
                    <div class="story-metric">
                        <span class="story-metric-value">03</span>
                        <span class="story-metric-label">Live service readiness</span>
                    </div>
                </div>
            </section>

            <section class="scroll-showcase reveal" data-reveal>
                <div class="sticky-copy">
                    <p class="section-eyebrow">Service architecture</p>
                    <h2 class="section-title">Scroll through the service story the way a premium software company would present it.</h2>
                    <p class="story-copy">
                        Each band focuses on one operational promise: visibility, action, and trust.
                    </p>
                </div>
                <div class="showcase-stack">
                    <article class="showcase-card">
                        <span class="card-kicker">01 Command layer</span>
                        <h3>Executive-grade command center experiences</h3>
                        <p>
                            Turn operational data into a visual language that executives, service
                            managers, and platform teams can all scan in seconds.
                        </p>
                    </article>
                    <article class="showcase-card">
                        <span class="card-kicker">02 Automation</span>
                        <h3>Signals that trigger action, not just observation</h3>
                        <p>
                            Failed integrations, open incidents, and recoveries flow into guided
                            action patterns rather than static report pages.
                        </p>
                    </article>
                    <article class="showcase-card">
                        <span class="card-kicker">03 Experience</span>
                        <h3>Product-grade rhythm across dark mode and day mode</h3>
                        <p>
                            The page is calmer, sharper, and easier to stay inside during long
                            operational sessions and stakeholder reviews.
                        </p>
                    </article>
                </div>
            </section>

            <section class="immersive-band reveal" data-reveal>
                <div class="immersive-copy">
                    <p class="section-eyebrow">Immersive showcase</p>
                    <h2 class="section-title">Oversized product moments that frame the service like software, not consulting slides.</h2>
                </div>
                <div class="immersive-grid">
                    <article class="immersive-panel panel-primary">
                        <span class="panel-kicker">Portal hero</span>
                        <h3>Launch with a high-trust front door</h3>
                        <p>Lead with a strong headline, ambient motion, and a visual system that supports the data sections underneath.</p>
                    </article>
                    <article class="immersive-panel panel-secondary">
                        <span class="panel-kicker">Operations view</span>
                        <h3>Guide operators from signal to drill-down</h3>
                        <p>Use branded list surfaces, status pills, and concise action entry points instead of default utility-heavy chrome.</p>
                    </article>
                </div>
            </section>

            <section class="section section-tight reveal" data-reveal>
                <div class="section-heading">
                    <p class="section-eyebrow">Platform narrative</p>
                    <h2 class="section-title">Designed like a serious software company, not a utility portal.</h2>
                </div>
                <div class="feature-grid">
                    <article class="feature-card feature-large">
                        <span class="card-kicker">01 Premium command surface</span>
                        <h3>Turn operations into a visual product story</h3>
                        <p>
                            We transform raw Salesforce operations into high-confidence surfaces that
                            feel intentional, branded, and ready for both executive review and
                            hands-on operational work.
                        </p>
                    </article>
                    <article class="feature-card">
                        <span class="card-kicker">02 Guided movement</span>
                        <h3>Animation that supports clarity</h3>
                        <p>
                            Motion is used to reveal hierarchy, create depth, and pace attention
                            rather than decorate the page.
                        </p>
                    </article>
                    <article class="feature-card">
                        <span class="card-kicker">03 Portal trust</span>
                        <h3>Experience Cloud with real product confidence</h3>
                        <p>
                            The page builds trust before the user even reaches incidents,
                            integrations, and analytics.
                        </p>
                    </article>
                </div>
            </section>

            <section class="section insight-grid reveal" data-reveal>
                <article class="insight-panel">
                    <p class="section-eyebrow">What teams gain</p>
                    <h2 class="section-title">Faster decisions with less visual noise.</h2>
                    <ul class="insight-list">
                        <li>One portal surface for service health, incident context, and integration exceptions</li>
                        <li>Cleaner path from monitoring to action through page-level drill-down views</li>
                        <li>Branded enterprise UX that feels credible in front of customers and executives</li>
                    </ul>
                </article>
                <article class="ops-board">
                    <div class="board-header">
                        <span class="board-title">Realtime experience blueprint</span>
                        <span class="board-state">Production style</span>
                    </div>
                    <div class="board-rows">
                        <div class="board-row">
                            <span class="board-key">Home</span>
                            <span class="board-value">Hero, service posture, live summary cards</span>
                        </div>
                        <div class="board-row">
                            <span class="board-key">Incidents</span>
                            <span class="board-value">Open queue, severity, detail navigation</span>
                        </div>
                        <div class="board-row">
                            <span class="board-key">Integrations</span>
                            <span class="board-value">Failure tracking, warnings, response times</span>
                        </div>
                        <div class="board-row">
                            <span class="board-key">Analytics</span>
                            <span class="board-value">Operational insights and service trend reporting</span>
                        </div>
                    </div>
                </article>
            </section>

            <section class="final-callout reveal" data-reveal>
                <div class="callout-copy-block">
                    <p class="section-eyebrow">Ready to scale</p>
                    <h2 class="section-title">Use this as the premium landing layer, then let the live SentinelFlow modules do the operational work below.</h2>
                </div>
                <div class="callout-actions">
                    <a class="primary-action" href={primaryActionUrl}>Plan the next release</a>
                    <a class="secondary-action" href={secondaryActionUrl}>See service architecture</a>
                </div>
            </section>
        </div>
    </section>
</template>
