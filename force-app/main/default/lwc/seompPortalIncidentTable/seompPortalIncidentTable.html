<template>
    <lightning-card title="SEOMP Incidents" icon-name="utility:warning">
        <div class="slds-p-horizontal_medium slds-p-top_small table-note">
            <template if:true={error}>{error}</template>
        </div>
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <lightning-datatable
                key-field="id"
                data={rows}
                columns={columns}
                hide-checkbox-column>
            </lightning-datatable>
        </div>
    </lightning-card>
</template>
