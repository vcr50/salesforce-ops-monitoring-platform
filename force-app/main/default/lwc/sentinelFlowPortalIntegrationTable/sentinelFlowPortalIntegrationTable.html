<template>
    <section class="table-shell">
        <div class="table-header">
            <div class="headline-block">
                <p class="table-eyebrow">Integration watchlist</p>
                <h2 class="table-title">SentinelFlow Integrations</h2>
                <p class="table-copy">
                    Failed and warning integrations surfaced for rapid investigation.
                </p>
            </div>
            <div class="table-meta">
                <span class="table-count">{rowCount}</span>
                <span class="table-meta-label">flagged records</span>
            </div>
        </div>
        <template if:true={error}>
            <div class="table-state error-state">{error}</div>
        </template>
        <template if:false={error}>
            <template if:true={hasRows}>
                <div class="table-board">
                    <div class="table-toolbar">
                        <button class="sort-chip" data-field="apiName" onclick={handleHeaderSort} type="button">
                            API
                        </button>
                        <button class="sort-chip" data-field="status" onclick={handleHeaderSort} type="button">
                            Status
                        </button>
                        <button class="sort-chip" data-field="responseTime" onclick={handleHeaderSort} type="button">
                            Response time
                        </button>
                    </div>
                    <div class="table-list">
                        <template for:each={rows} for:item="row">
                            <div class="table-row" key={row.id}>
                                <div class="row-primary">
                                    <span class="row-name">{row.apiName}</span>
                                </div>
                                <div class="row-pill-cell">
                                    <span class={row.statusClass}>{row.status}</span>
                                </div>
                                <div class="row-metric">{row.responseTimeLabel}</div>
                                <div class="row-action-cell">
                                    <button class="row-action" data-id={row.id} onclick={handleViewDetail} type="button">
                                        View detail
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
            <template if:false={hasRows}>
                <div class="table-state empty-state">
                    No failed or warning integrations at the moment.
                </div>
            </template>
        </template>
    </section>
</template>
